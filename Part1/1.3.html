<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息</title>
    <style>
        *{
            margin: 0 auto;
            padding: 0;
        }
        body{
            background-color: #7063c5;
        }
        .box{
            position: relative;
            width: 600px;
            height: 850px;
            padding-top: 1px;
            margin: 50px auto;
            background-color: white;
            border-radius: 50px;
        }
        .introduce{
            padding-top: 1px;
            width: 600px;
            height: 425px;
            text-align: center;
        }
        .introduce img{
            display: block;
            width: 187px;
            margin-top: 40px;
            border-radius: 50%;
            border: 5px solid #7b8cee;
        }
        .name{
            margin-top: 25px;
            font-size: 50px;
        }
        .introduce p{
            font-size: 35px;
            margin-top: 5px;
            color: #6ca6f4;
        }
        .line{
            width: 500px;
            height: 5px;
            margin: 40px auto;
            background: linear-gradient(to right, transparent, #a78bfa, transparent);;
        }
        .information{
            height: 425px;

        }
        .information .slogan{
            margin-top: 40px;
        }
        .information .slogan p{
            text-align: center;
            font-size: 30px;
            color: #666666;
        }
        .icon{
            width: 400px;
            height: 100px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: space-around;

        }
        .icon a{
            display: inline-flex;
            align-items: center;
            justify-content: center;
            outline: none;

        }
        .icon  img{
            width: 70px;
            border-radius: 50%;
            vertical-align: middle;
        }

        .bottom{
            width: 600px;
            position: absolute;
            left: 0;
            bottom:80px;
            text-align: center;
        }
        .email{
            height: 50px;
            display: inline-flex;
            line-height: 50px;
            font-size: 30px;
            color: #A69999;
        }
        .email img{
            width: 50px;
        }
    </style>
</head>
<body>
    <div class="box">
       <div class="introduce">
           <img src="./src/picture.jpg" alt="">
           <h2 class="name">Rainan</h2>
           <p>立志成为一个糕手</p>
           <div class="line"></div>
       </div>
        <div class="information">
            <div class="slogan">
                <p>热爱编程&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;喜欢创造</p>
                <p>专注技术&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;持续学习</p>
            </div>
            <div class="icon">
                <a href="https://blog.csdn.net/2502_90388158?spm=1000.2115.3001.5343" target="_blank"><img src="./src/csdn.png" alt=""></a>
                <a href="https://github.com/china-en" target="_blank"><img src="./src/github.png" alt="" style="width: 80px;"></a>
                
            </div>
            <div class="bottom">
                <p class="email" ><img src="./src/email.png" alt="" >&nbsp;&nbsp;Rainan@126.com</p>
            </div>
        </div>

    </div>
</body>
</html>
