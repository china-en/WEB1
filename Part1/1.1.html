<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
  <style>
    *{
      margin: 20px auto;
      padding: 0;
    }
    .box{
      height: 480px;
      width: 800px;
      border: 2px solid grey;
      text-align: center;
      box-shadow: 0 0 20px grey;
    }
    .title{
      font-size: 40px;
      text-shadow:2px 0px 2px grey;
      margin-bottom: 40px;
      letter-spacing: 30px;
    }
    .information input{
      display: block;
      width: 600px;
      height: 80px;
    }
   
    input::placeholder{
      text-indent: 30px;
      font-size: 25px;
    }

    .btn{
      display: flex;
      align-content: space-between;
      width: 600px;
      height: 50px;
    }
    .btn input{
      width: 150px;
      height: 50px;
      color: black;
      background-color: orange;
      border: 0px;
      font-size: 25px;
    }
    .btn input:hover{
      box-shadow: 0 0 10px orange;
    }
    .option{
      width: 600px;
      height: 50px;
      margin-top: 50px;
      text-align: right;
    }


  </style>
</head>
<body>
  <div class="box">
    <p class="title">用户登录</p>
    <div class="information">
      <input type="text" placeholder="用户名">
      <input type="password" placeholder="密码">
    </div>
    <div class="btn">
      <input type="button" value="确认">
      <input type="button" value="取消">
    </div>
    <div class="option">
      <a href="#">注册用户</a>
      <a href="#">忘记密码?</a>
    </div>
  </div>
</body>
</html>
